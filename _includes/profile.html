<div class="profile-sidebar">
    <!-- Circular profile image -->
    <div class="profile-image-container">
        <img src="{{ site.profile.profile_image | relative_url }}" alt="{{ site.profile.name }}" class="profile-image">
    </div>

    <!-- Name and title -->
    <h1 class="profile-name">{{ site.profile.name }}</h1>
    <p class="profile-title">{{ site.profile.title }}</p>

    <!-- Short bio -->
    <p class="profile-bio">{{ site.profile.bio }}</p>

    <!-- Contact and social links -->
    <ul class="profile-links">
        <li class="profile-link-item">
            <a href="#" class="profile-link" aria-label="Location">
                <svg class="profile-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
                <span>{{ site.profile.location }}</span>
            </a>
        </li>
        <li class="profile-link-item">
            <a href="mailto:{{ site.profile.email }}" class="profile-link" aria-label="Email">
                <svg class="profile-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <span>{{ site.profile.email }}</span>
            </a>
        </li>
        <li class="profile-link-item">
            <a href="{{ site.profile.github }}" target="_blank" rel="noopener" class="profile-link" aria-label="GitHub">
                <svg class="profile-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
                </svg>
                <span>GitHub</span>
            </a>
        </li>
    </ul>
</div>
